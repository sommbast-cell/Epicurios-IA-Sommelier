<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Epicurios IA - Sommelier Intelligent</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5efe6;
  color: #2c2c2c;
}

.container {
  max-width: 750px;
  margin: 50px auto;
  padding: 20px;
  text-align: center;
}

h1 {
  font-size: 34px;
  margin-bottom: 5px;
}

h1 span {
  color: #7b1e3a;
}

.subtitle {
  color: #666;
  margin-bottom: 25px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 15px;
}

textarea {
  width: 100%;
  height: 110px;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ddd;
  margin-bottom: 10px;
}

button {
  background: #7b1e3a;
  color: white;
  border: none;
  padding: 12px 18px;
  border-radius: 20px;
  cursor: pointer;
  margin: 5px;
}

.mode button {
  background: #ddd;
  color: #333;
}

#response {
  margin-top: 20px;
  text-align: left;
  white-space: pre-line;
  background: white;
  padding: 15px;
  border-radius: 10px;
  min-height: 60px;
}

/* PREMIUM SECTION */
.premium {
  background: #7b1e3a;
  color: white;
  padding: 15px;
  border-radius: 12px;
  margin-top: 20px;
}

.premium button {
  background: white;
  color: #7b1e3a;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

  <h1>🍷 Epicurios <span>IA</span></h1>
  <p class="subtitle">Ton sommelier intelligent pour apprendre, déguster et vendre le vin</p>

  <div class="card">

    <div class="mode">
      <button onclick="setMode('particulier')">Particulier</button>
      <button onclick="setMode('pro')">Professionnel</button>
    </div>

    <textarea id="input" placeholder="Ex : Quel vin avec un burger ?"></textarea>

    <button onclick="ask()">Demander au sommelier</button>

    <div id="response"></div>

  </div>

  <div class="premium">
    <h3>🔥 Epicurios Pro</h3>
    <p>
      Accès aux cartes des vins optimisées, accords avancés et conseils pour restaurants.
    </p>
    <button onclick="alert('Version premium bientôt disponible')">
      Passer en Pro
    </button>
  </div>

</div>

<script>
let mode = "particulier";

function setMode(m) {
  mode = m;
}

async function ask() {
  const input = document.getElementById("input").value;

  document.getElementById("response").innerText = "Analyse Epicurios IA en cours... 🍷";

  const res = await fetch("/api/chat", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      message: input,
      mode: mode
    })
  });

  const data = await res.json();
  document.getElementById("response").innerText = data.reply;
}
</script>

</body>
</html>
